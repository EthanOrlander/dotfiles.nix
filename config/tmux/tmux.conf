# remap prefix to Control + a
unbind C-b
set -g prefix C-a
# bind C-a send-prefix
bind-key a send-prefix
bind u send-keys C-l
bind U send-keys C-l

# default shell
set-option -g default-shell $SHELL

# colors
# https://jdhao.github.io/2018/10/19/tmux_nvim_true_color/
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"

# start window numbering at 1 for easier switching
set -g base-index 1

# unicode / status update interval
set -g status-interval 5

# Status bar settings
set -g status-bg colour8
set -g status-left " %H:%M #[fg=colour1, bg=colour241] ❤️︎ "
set -g status-left-length 50
set -g status-right "#[fg=colour4, bg=colour241]  #[fg=colour4, bg=default] %H:%M:%S %d-%h-%Y "
set -g status-right-length 50

# Window title formatting
set-window-option -g window-status-format " #I〈#W〉"
set-window-option -g window-status-separator ""
set-window-option -g window-status-current-format " #I〈#W〉"
set -g window-style 'fg=colour253,bg=default'
set-window-option -g window-active-style 'fg=colour253,bg=default'
set-window-option -g window-status-activity-style 'fg=black,bg=green'
set-window-option -g window-status-current-style 'fg=black,bg=cyan'
set-window-option -g window-status-bell-style 'fg=red,bg=white'
set-window-option -g window-status-style 'fg=default,bg=blue'
set-window-option -g pane-active-border-style 'fg=colour2,bg=default'
set-window-option -g pane-border-style 'fg=colour8,bg=default'
set-window-option -g status-left-style 'fg=cyan,bg=black'
set-window-option -g status-right-style 'fg=cyan,bg=black'

# clock
set-window-option -g clock-mode-colour green

setw -g monitor-activity on
setw -g visual-activity on

# listen to alerts from all windows
set -g bell-action any

# screen like window toggling
bind Tab last-window

# rebind pane tiling
bind V split-window -h -c "#{pane_current_path}"
bind H split-window -v -c "#{pane_current_path}"

# window management
bind-key c new-window -n 'taco'
bind-key b previous-window

# bind fast session switching
unbind S
bind S command-prompt "switch -t %1"

# mouse related config
set -g mouse on
bind-key -T root WheelUpPane \
  if-shell -Ft= '#{mouse_any_flag}' 'send-keys -M' \
  'if-shell -Ft= "#{pane_in_mode}" "send-keys -M" "copy-mode"'

bind-key -T root WheelDownPane \
  if-shell -Ft= '#{mouse_any_flag}' 'send-keys -M' \
  'if-shell -Ft= "#{pane_in_mode}" "send-keys -M"'

# For nvim
set -s escape-time 0

# vi copy mode
setw -g mode-keys vi
unbind p
bind p paste-buffer

# Use zsh as the default shell
set-option -g default-shell /bin/zsh
set-option -g default-command /bin/zsh

# Copy to macOS clipboard
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# # New Tmux: use xclip to pipe copied text to the system clipboard
# bind-key -T copy-mode-vi 'v' send -X begin-selection
# bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in" \; display-message "highlighted selection copied to system clipboard"

# bind resize commands to keys
bind-key M-j resize-pane -D
bind-key M-k resize-pane -U
bind-key M-h resize-pane -L
bind-key M-l resize-pane -R

# clear history
bind -n C-k clear-history

set-option -g history-limit 10000

set-window-option -g automatic-rename off
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# T for Top (move current window to the top)
bind-key T swap-window -t 1

# hacks
set-option -g allow-rename off

# Allow quick pane switching using vim keys: cmd - hjkl
# using "aserowy/tmux.nvim" instead
# is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?x?)(diff)?$"'
# bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
# bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
# bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
# bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
# bind -n 'C-\' if-shell "$is_vim" "send-keys 'C-\\'" "select-pane -l"

# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Open tmux.conf in nvim
bind-key M split-window -h "nvim ~/.tmux.conf"

# Theme (if available)
# run-shell "~/.tmux/themes/nord-tmux/nord.tmux"

# Cursor shape for vi mode in zsh
set -g default-terminal "screen-256color"
set -as terminal-overrides ',xterm-256color:Tc'
set -g allow-passthrough on
